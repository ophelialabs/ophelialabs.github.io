<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Bootstrap & Site CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map3d-container {
        width: 100vw;
        height: 100vh;
      }
      #pano {
        width: 100vw;
        height: 100vh;
        display: none;
        position: absolute;
        top: 0; left: 0;
        z-index: 10;
      }
      .gm-style .gm-style-iw-c {
        max-width: 400px !important;
      }
    </style>
    <title>Gaia</title>
  </head>
  <body>
    <div id="map"></div>
    <div id="pano"></div>
    <script>
      let map, panorama;
      // You must use your own Google Maps JS API key here
      const GOOGLE_MAPS_API_KEY = "AIzaSyDK7BXtZz4ypjq0yr-7FrrAcl3oCoPpxK8";

      function loadGoogleMapsScript(callback) {
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=geometry,places`;
        script.async = true;
        script.onload = callback;
        document.head.appendChild(script);
      }

      function showStreetView(latLng) {
        document.getElementById('map3d-container').style.display = 'none';
        const panoDiv = document.getElementById('pano');
        panoDiv.style.display = 'block';
        if (!panorama) {
          panorama = new google.maps.StreetViewPanorama(panoDiv, {
            position: latLng,
            pov: { heading: 165, pitch: 0 },
            visible: true,
            fullscreenControl: true,
          });
        } else {
          panorama.setPosition(latLng);
          panorama.setVisible(true);
        }
      }

      function hideStreetView() {
        document.getElementById('map3d-container').style.display = 'block';
        document.getElementById('pano').style.display = 'none';
        if (panorama) panorama.setVisible(false);
      }

      function initMap() {

        // Enable Street View when zoomed in close enough
        map.addListener("zoom_changed", () => {
          if (map.getZoom() >= 16) {
            map.setOptions({ streetViewControl: true });
          } else {
            map.setOptions({ streetViewControl: false });
            hideStreetView();
          }
        });

        // Add click handler to trigger Street View at clicked location if zoomed in
        map.addListener("click", (e) => {
          if (map.getZoom() >= 16) {
            const sv = new google.maps.StreetViewService();
            sv.getPanorama({ location: e.latLng, radius: 50 }, (data, status) => {
              if (status === "OK") {
                showStreetView(e.latLng);
              }
            });
          }
        });

        // Hide Street View when user closes it
        window.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') hideStreetView();
        });
      }

      // Load the Google Maps API and initialize the map
      loadGoogleMapsScript(() => {
        window.initMap = initMap;
        initMap();
      });
    </script>
  </body>
</html>
