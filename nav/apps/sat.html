<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn | Ophelia</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Globe-ChessAdv: Strategic globe visualization and alerts for global events, alliances, and regions.">
    <meta name="keywords" content="Ophelia, Saturn, globe, chess, strategic, alerts, alliances, regions, visualization, map, security, events">
    <meta name="author" content="Ophelia Labs">
    <link rel="canonical" href="https://ophelialabs.github.io/nav/apps/saturn.html">
    <!-- Open Graph -->
    <meta property="og:title" content="Saturn | Ophelia">
    <meta property="og:description" content="Globe-ChessAdv: Strategic globe visualization and alerts for global events, alliances, and regions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ophelialabs.github.io/nav/apps/saturn.html">
    <meta property="og:site_name" content="Ophelia">
    <!-- Bootstrap & Site CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/static/content/site.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; padding: 0; }
        #globe-container { width: 75vw; height: 75vh; padding: 2rem; border-radius: 16px; box-shadow: 0 8px 32px rgba(59,130,246,0.18); }
    </style>
</head>
<body>
<div id="header-include"></div>
    <main>
        <div style="display: flex; gap: 2rem; align-items: flex-start; margin-bottom: 2.5rem;">
            <!-- Map Section -->
            <div class="chess-controls">
                <div id="globe-container">
                    <input
                        type="text"
                        id="location-search"
                        placeholder="Enter a location..."
                        style="width: 70%; padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 1rem;"
                    />
                    <button
                        id="search-btn"
                        style="padding: 0.6rem 1.2rem; border-radius: 8px; border: none; background: #60a5fa; color: #fff; font-size: 1rem; cursor: pointer;"
                    >
                        Search
                    </button>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-include"></div>

    <!-- Google Maps JS API Loader and main script -->
    <script>
        // This callback will be called once the Google Maps JS API has loaded
        function initSaturnGlobe() {
            // Load Maps JS API libraries
            (async function () {
                // Wait for the libraries to load
                const { Map3DElement, MapMode } = await google.maps.importLibrary("maps3d");
                const { PinElement } = await google.maps.importLibrary("marker");

                // Create the 3D globe map
                window.map3D = new Map3DElement({
                    mode: MapMode.HYBRID,
                    center: { lat: 0, lng: 0 },
                    zoom: 2,
                });

                // Add the globe to the container, after clearing input/button
                const globeContainer = document.getElementById("globe-container");
                // Remove the search bar and button from globeContainer, move outside so globe is not inside them
                const searchInput = document.getElementById("location-search");
                const searchBtn = document.getElementById("search-btn");

                // Create a wrapper div for the search bar and button
                const searchWrapper = document.createElement("div");
                searchWrapper.style.marginBottom = "1rem";
                searchWrapper.appendChild(searchInput);
                searchWrapper.appendChild(searchBtn);

                // Remove input/button from globeContainer, insert before globeContainer
                globeContainer.parentNode.insertBefore(searchWrapper, globeContainer);

                // Now clear globeContainer and put only the globe inside
                globeContainer.innerHTML = "";
                globeContainer.appendChild(window.map3D);

                // Setup search button functionality
                document.getElementById("search-btn").onclick = async function () {
                    const query = document.getElementById("location-search").value;
                    if (!query) return;

                    try {
                        // Use Google Maps Geocoding API to find location coordinates
                        // NOTE: Replace YOUR_GEOCODING_API_KEY with an actual key if needed, or use the same API key if enabled
                        const geocodeRes = await fetch(
                            `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=AIzaSyDK7BXtZz4ypjq0yr-7FrrAcl3oCoPpxK8`
                        );
                        const geocodeData = await geocodeRes.json();
                        if (
                            geocodeData.status === "OK" &&
                            geocodeData.results &&
                            geocodeData.results.length > 0
                        ) {
                            const location = geocodeData.results[0].geometry.location;
                            // Center the globe on the location
                            window.map3D.setCenter(location);
                            window.map3D.setZoom(4);

                            // Add a marker pin on the searched location
                            const marker = new PinElement({
                                position: location,
                                scale: 1.2,
                                title: geocodeData.results[0].formatted_address,
                            });
                            window.map3D.markers = window.map3D.markers || [];
                            window.map3D.markers.forEach((m) => m.setMap(null)); // Clear previous markers
                            window.map3D.markers = [marker];
                            marker.setMap(window.map3D);
                        } else {
                            alert("Location not found.");
                        }
                    } catch (err) {
                        alert("Error searching for location: " + err);
                    }
                };
            })();
        }

        // Load Google Maps JS API and call initSaturnGlobe when ready
        (function () {
            const callbackName = "initSaturnGlobe";
            window[callbackName] = initSaturnGlobe;
            const script = document.createElement("script");
            script.src =
                "https://maps.googleapis.com/maps/api/js?key=AIzaSyDK7BXtZz4ypjq0yr-7FrrAcl3oCoPpxK8&v=alpha&libraries=maps3d,marker&callback=" +
                callbackName;
            script.async = true;
            document.head.appendChild(script);
        })();
    </script>
    <script>
    // Dynamic header/footer includes
    fetch('/main/header.html').then(r => r.text()).then(t => {
        document.getElementById('header-include').innerHTML = t;
    });
    fetch('/main/footer.html').then(r => r.text()).then(t => {
        document.getElementById('footer-include').innerHTML = t;
    });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
