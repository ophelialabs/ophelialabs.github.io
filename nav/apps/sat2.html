<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn | Ophelia</title>
    <!-- Bootstrap & Site CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e293b; color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        #globe-container { width: 100vw; height: 100vh; }
        .map-placeholder {
            width: 100%;
        }
        .center-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <main>
        <div class="center-container" style="margin-top: 4rem; margin-bottom: 2.5rem;">
            <!-- Map Section -->
            <div class="map-placeholder">
                <div id="globe-container"></div>
            </div>
        </div>
    </main>
    <div id="footer-include"></div>
    <script>
        // Google Maps JS API Loader and main scripts
        (g => {
            var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window;
            b = b[c] || (b[c] = {});
            var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => {
                await (a = m.createElement("script"));
                e.set("libraries", [...r] + "");
                for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
                e.set("callback", c + ".maps." + q);
                a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
                d[q] = f;
                a.onerror = () => h = n(Error(p + " could not load."));
                a.nonce = m.querySelector("script[nonce]")?.nonce || "";

            }));
            d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n))
        })({
            key: "AIzaSyDK7BXtZz4ypjq0yr-7FrrAcl3oCoPpxK8",
            v: "alpha"
        });
                
        // 
        async function init() {
            const { Map3DElement, MapMode } = await google.maps.importLibrary("maps3d");
            await google.maps.importLibrary('marker'); // ensure marker lib loaded

            map3D = new Map3DElement({
                mode: MapMode.HYBRID,
            });

            // Initial globe
            document.getElementById('globe-container').append(map3D);
            document.addEventListener('DOMContentLoaded', () => {
            init();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
