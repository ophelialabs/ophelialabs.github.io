<style>
    body { background: #1e293b; color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
    #globe-container { width: 75vw; height: 75vh; }
    
    /* Modern Search Bar Styling */
    .search-container {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        width: 100%;
        max-width: 600px;
    }
    
    .search-input {
        flex: 1;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        border: 2px solid #334155;
        background: #1e293b;
        color: #f1f5f9;
        font-size: 1rem;
        transition: all 0.2s ease;
    }
    
    .search-input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }
    
    .search-btn {
        padding: 0.75rem 1.5rem;
        border-radius: 12px;
        border: none;
        background: #3b82f6;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .search-btn:hover {
        background: #2563eb;
        transform: translateY(-1px);
    }
    
    /* Modern Alerts Section */
    .alerts-section {
        flex: 1;
        position: relative;
        width: 100%;
        max-width: 400px;
    }
    
    .alerts-popup {
        position: sticky;
        top: 2rem;
        padding: 1.5rem;
        background: rgba(30, 41, 59, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .alert-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    .alert-item {
        margin-bottom: 1rem;
        transition: transform 0.2s ease;
        cursor: pointer;
    }
    
    .alert-item:hover {
        transform: translateX(4px);
    }
    
    .alert-content {
        background: rgba(30, 41, 59, 0.8);
        border-left: 4px solid;
        border-radius: 12px;
        padding: 1rem;
        display: flex;
        gap: 1rem;
        align-items: flex-start;
        transition: all 0.2s ease;
    }
    
    .alert-content:hover {
        background: rgba(30, 41, 59, 0.9);
    }
    
    .alert-icon {
        font-size: 1.25rem;
        line-height: 1;
    }
    
    .alert-title {
        font-weight: 600;
        color: #f1f5f9;
        font-size: 1.1rem;
        margin-bottom: 0.25rem;
    }
    
    .alert-message {
        color: #cbd5e1;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
    }
    
    .alert-timestamp {
        font-size: 0.85rem;
        color: #64748b;
    }
    
    .alert-category {
        font-size: 1rem;
        font-weight: 600;
        margin: 1.5rem 0 1rem 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .alert-category::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    
    .alert-category.critical::before { background: #ef4444; }
    .alert-category.high::before { background: #f59e42; }
    .alert-category.medium::before { background: #38bdf8; }
    
    .no-alerts {
        background: rgba(59, 130, 246, 0.1);
        border-radius: 12px;
        padding: 2rem;
        color: #94a3b8;
        text-align: center;
        font-size: 0.95rem;
    }

                        </svg>
                        <div>No urgent alerts at this time</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // Update search functionality
        document.getElementById('location-search').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const matchingLocations = countryLocations.filter(loc => 
                loc.name.toLowerCase().includes(searchTerm) ||
                loc.event.toLowerCase().includes(searchTerm) ||
                loc.region.toLowerCase().includes(searchTerm)
            );
            
            if (matchingLocations.length > 0 && searchTerm.length >= 2) {
                const firstMatch = matchingLocations[0];
                const marker = countryMarkers.find(m => m.label === firstMatch.name);
                
                if (marker && window.map3D) {
                    window.map3D.flyCameraTo({
                        endCamera: {
                            center: marker.position,
                            tilt: 45,
                            range: 2000,
                            heading: 0,
                        },
                        durationMillis: 1500,
                    });
                }
            }
        });
    </script>

                  <!-- Update Map with users Location -->
                  <script>
                    function updateMapWithLocation() {
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(function(position) {
                                var lat = position.coords.latitude;
                                var lng = position.coords.longitude;
                                var iframe = document.getElementById('user-map');
                                iframe.src = `https://www.google.com/maps/embed/v1/view?key=AIzaSyDK7BXtZz4ypjq0yr-7FrrAcl3oCoPpxK8&center=${lat},${lng}&zoom=12`;
                            });
                        }
                    }
                    window.onload = updateMapWithLocation;

                    document.getElementById('search-btn').onclick = function() {
                        var location = document.getElementById('location-search').value.trim();
                        if (location) {
                            var iframe = document.getElementById('user-map');
                            iframe.src = `https://www.google.com/maps/embed/v1/search?key=AIzaSyDK7BXtZz4ypjq0yr-7FrrAcl3oCoPpxK8&q=${encodeURIComponent(location)}&zoom=12`;
                        }
                    };

                    document.getElementById('location-search').addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            document.getElementById('search-btn').click();
                        }
                    });
                </script>
